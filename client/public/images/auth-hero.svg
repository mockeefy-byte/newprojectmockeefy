<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
    <linearGradient id="bg2" x1="100%" y1="0%" x2="0%" y2="100%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
  </defs>
  <!-- Soft bluish shapes: interview / professional vibe -->
  <circle cx="120" cy="180" r="140" fill="rgba(255,255,255,0.06)" />
  <circle cx="680" cy="320" r="200" fill="rgba(255,255,255,0.05)" />
  <ellipse cx="400" cy="700" rx="280" ry="180" fill="rgba(255,255,255,0.04)" />
  <rect x="80" y="500" width="240" height="320" rx="24" fill="url(#bg1)" opacity="0.9" />
  <rect x="480" y="420" width="260" height="280" rx="24" fill="url(#bg2)" opacity="0.9" />
  <!-- Abstract "person at desk" / interview silhouette -->
  <circle cx="200" cy="620" r="48" fill="rgba(255,255,255,0.12)" />
  <rect x="160" cy="680" width="80" height="100" rx="8" fill="rgba(255,255,255,0.08)" />
  <rect x="520" cy="540" width="160" height="12" rx="4" fill="rgba(255,255,255,0.1)" />
  <rect x="520" cy="565" width="120" height="12" rx="4" fill="rgba(255,255,255,0.07)" />
  <rect x="520" cy="590" width="140" height="12" rx="4" fill="rgba(255,255,255,0.06)" />
</svg>
